<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Comparison Tool</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        .container {
            max-width: 800px;
        }
        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="bg-gray-800 flex items-center justify-center min-h-screen p-4">

    <!-- Main Container -->
    <div class="container bg-gray-900 p-8 rounded-2xl shadow-xl w-full">

        <!-- Header with a new icon and vibrant colors -->
        <div class="flex items-center justify-center mb-2">
            <!-- New SVG logo for the app title -->
            <svg class="w-10 h-10 text-orange-500 mr-3" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7V17L12 22L22 17V7L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 7V17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M17 9.5L7 14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M17 14.5L7 9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <h1 class="text-3xl sm:text-4xl font-bold text-center text-white">
                Smart Price Finder
            </h1>
        </div>
        <p class="text-center text-gray-400 mb-8">
            Enter a product name to compare prices across different platforms.
        </p>

        <!-- Search Input and Button -->
        <div class="flex flex-col sm:flex-row gap-4 mb-8">
            <input type="text" id="product-input" placeholder="e.g., Apple iPad Pro"
                   class="flex-grow p-3 sm:p-4 border border-gray-700 bg-gray-800 text-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all duration-300 placeholder-gray-400">
            <button id="compare-btn"
                    class="bg-gradient-to-r from-orange-500 to-red-600 text-white font-semibold p-3 sm:p-4 rounded-xl shadow-lg hover:from-orange-600 hover:to-red-700 transition-all duration-300 transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                Find Prices
            </button>
        </div>

        <!-- Loading Indicator -->
        <div id="loading" class="hidden space-y-4">
             <!-- Skeleton Loader -->
             <div class="animate-pulse bg-gray-800 p-4 rounded-xl shadow-md">
                <div class="flex items-center justify-between">
                    <div>
                        <div class="h-6 bg-gray-700 rounded w-48 mb-2"></div>
                        <div class="h-4 bg-gray-700 rounded w-24"></div>
                    </div>
                    <div class="h-8 bg-gray-700 rounded w-20"></div>
                </div>
                <div class="h-4 bg-gray-700 rounded w-32 mt-4"></div>
            </div>
             <div class="animate-pulse bg-gray-800 p-4 rounded-xl shadow-md">
                <div class="flex items-center justify-between">
                    <div>
                        <div class="h-6 bg-gray-700 rounded w-48 mb-2"></div>
                        <div class="h-4 bg-gray-700 rounded w-24"></div>
                    </div>
                    <div class="h-8 bg-gray-700 rounded w-20"></div>
                </div>
                <div class="h-4 bg-gray-700 rounded w-32 mt-4"></div>
            </div>
        </div>

        <!-- Results Display Area -->
        <div id="results" class="space-y-4">
            <!-- Results will be dynamically inserted here -->
        </div>

        <!-- No Results Message -->
        <div id="no-results" class="hidden text-center text-gray-400 font-medium p-8 rounded-xl bg-gray-800 border-dashed border-2 border-gray-700">
            <p>No products found. Try a different search term!</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const productInput = document.getElementById('product-input');
            const compareBtn = document.getElementById('compare-btn');
            const resultsDiv = document.getElementById('results');
            const loadingDiv = document.getElementById('loading');
            const noResultsDiv = document.getElementById('no-results');

            // Replace with your actual backend URL if deployed
            const API_URL = 'http://127.0.0.1:5000/compare-prices';
            
            // Map of platform names to SVG logos
            const platformLogos = {
                'amazon': `<svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7V17L12 22L22 17V7L12 2Z"/><path d="M12 7V17"/><path d="M17 9.5L7 14.5"/><path d="M17 14.5L7 9.5"/></svg>`,
                'best buy': `<svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"/><path d="M9 10L15 14L12 22"/><path d="M15 10L9 14L12 22"/></svg>`,
                'ebay': `<svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 12C21.5 17.2467 16.5 21.5 12 21.5C7.5 21.5 2.5 17.2467 2.5 12C2.5 6.75333 7.5 2.5 12 2.5C16.5 2.5 21.5 6.75333 21.5 12Z"/><path d="M12 12C12 15.3137 9.31371 18 6 18"/><path d="M12 12C12 8.68629 14.6863 6 18 6"/></svg>`,
                'walmart': `<svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2Z"/><path d="M8 12L16 12"/><path d="M12 8L12 16"/><path d="M12 12L16 16L8 16L12 12Z"/></svg>`,
                'default': `<svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7V17L12 22L22 17V7L12 2Z"/><path d="M12 7V17"/><path d="M17 9.5L7 14.5"/><path d="M17 14.5L7 9.5"/></svg>`
            };

            // Custom modal for alerts
            function alertMessage(message) {
                const modal = document.createElement('div');
                modal.className = "fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center z-50";
                modal.innerHTML = `
                    <div class="bg-gray-800 p-6 rounded-xl shadow-lg max-w-sm mx-4 text-center">
                        <p class="text-lg font-medium text-gray-200 mb-4">${message}</p>
                        <button class="bg-red-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-red-700 transition-colors duration-200" onclick="this.parentNode.parentNode.remove()">
                            OK
                        </button>
                    </div>
                `;
                document.body.appendChild(modal);
            }

            // Event listener for the "Find Prices" button
            compareBtn.addEventListener('click', async () => {
                const productName = productInput.value.trim();
                if (!productName) {
                    alertMessage("Please enter a product name.");
                    return;
                }

                // Clear previous results and show loading indicator
                resultsDiv.innerHTML = '';
                noResultsDiv.classList.add('hidden');
                loadingDiv.classList.remove('hidden');
                compareBtn.disabled = true;

                try {
                    const response = await fetch(`${API_URL}?product=${encodeURIComponent(productName)}`);
                    const data = await response.json();

                    if (data.error) {
                        alertMessage(`Error: ${data.error}`);
                    } else if (data.length > 0) {
                        displayResults(data);
                    } else {
                        noResultsDiv.classList.remove('hidden');
                    }
                } catch (error) {
                    console.error('Fetch error:', error);
                    alertMessage("Failed to fetch data. Ensure the backend server is running.");
                } finally {
                    loadingDiv.classList.add('hidden');
                    compareBtn.disabled = false;
                }
            });

            function displayResults(data) {
                // Sort results by price from lowest to highest
                data.sort((a, b) => {
                    const priceA = parseFloat(a.price.replace(/[^0-9.]/g, ''));
                    const priceB = parseFloat(b.price.replace(/[^0-9.]/g, ''));
                    return priceA - priceB;
                });

                data.forEach((item, index) => {
                    const isBestPrice = index === 0;
                    const card = document.createElement('div');
                    card.className = `relative p-4 sm:p-6 rounded-xl shadow-md transition-transform duration-300 hover:scale-[1.02] animate-fade-in ${isBestPrice ? 'bg-emerald-800 border-2 border-emerald-500 shadow-xl' : 'bg-gray-800'}`;
                    
                    const platformName = item.platform.toLowerCase();
                    const platformLogo = platformLogos[platformName] || platformLogos['default'];
                    
                    if (isBestPrice) {
                         // Best price badge with SVG icon
                        card.innerHTML += `
                            <div class="absolute top-0 right-0 -mt-3 -mr-3 px-4 py-1.5 bg-emerald-600 text-white font-bold text-xs rounded-full shadow-lg transform rotate-6">
                                <span class="flex items-center">
                                    <!-- New SVG icon for the badge -->
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="20 6 9 17 4 12"></polyline>
                                    </svg>
                                    Best Price!
                                </span>
                            </div>
                        `;
                    }

                    card.innerHTML += `
                        <div class="flex items-start justify-between">
                            <div class="flex items-center">
                                <span class="text-orange-500 mr-3">${platformLogo}</span>
                                <div>
                                    <h3 class="text-lg sm:text-xl font-semibold text-gray-100">${item.name}</h3>
                                    <p class="text-sm sm:text-base text-gray-400 mt-1">${item.platform}</p>
                                </div>
                            </div>
                            <span class="text-2xl sm:text-3xl font-bold text-orange-400 ml-4">${item.price}</span>
                        </div>
                        <a href="${item.link}" target="_blank" class="mt-4 inline-block text-gray-400 hover:text-orange-500 transition-colors duration-300">
                            View Product &rarr;
                        </a>
                    `;
                    resultsDiv.appendChild(card);
                });
            }
        });
    </script>

</body>
</html>
